<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up – Equanomia</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
 
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
 
<div class="auth-container">
  <div class="auth-left">
    <div class="auth-brand">
      <a href="{{ url_for('index') }}" class="brand-link">
        <span class="brand-icon">🌸</span>
        <span class="brand-name">Equanomia</span>
      </a>
    </div>
    <div class="auth-illustration">
      <div class="wellness-orb orb-small">
        <div class="orb-ring ring-1"></div>
        <div class="orb-ring ring-2"></div>
        <div class="orb-center"><span class="orb-emoji">🌱</span></div>
      </div>
    </div>
    <div class="auth-quote">
      <p>"Every journey begins with a single step. This is yours."</p>
      <span>— Equanomia Team</span>
    </div>
    <div class="auth-steps">
      <div class="step-item active">
        <div class="step-num">1</div>
        <span>Create Account</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-num">2</div>
        <span>Wellness Quiz</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-num">3</div>
        <span>Your Dashboard</span>
      </div>
    </div>
  </div>
 
  <div class="auth-right">
    <div class="auth-card glass-card animate-slide-up">
      <div class="auth-card-header">
        <h2>Begin Your Journey 🌱</h2>
        <p>Create your free wellness account</p>
      </div>
 
      {% if error %}
      <div class="auth-error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}
 
      <form method="POST" action="{{ url_for('signup') }}" class="auth-form" id="signupForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-user"></i> Full Name</label>
            <input type="text" name="name" class="form-input" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label class="form-label"><i class="fas fa-at"></i> Username</label>
            <input type="text" name="username" class="form-input" placeholder="Choose a username" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Password</label>
          <div class="input-with-toggle">
            <input type="password" name="password" class="form-input" id="passwordInput" placeholder="Create a strong password" required>
            <button type="button" class="password-toggle" onclick="togglePassword('passwordInput', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-check-circle"></i> Confirm Password</label>
          <div class="input-with-toggle">
            <input type="password" id="confirmPass" class="form-input" placeholder="Confirm your password" required>
            <span class="pass-match-icon" id="passMatchIcon"></span>
          </div>
        </div>
        <div class="form-checkbox">
          <input type="checkbox" id="termsCheck" required>
          <label for="termsCheck">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn-primary-full" id="signupBtn">
          <span class="btn-text"><i class="fas fa-heart"></i> Create Account & Start</span>
          <span class="btn-loading" style="display:none"><i class="fas fa-spinner fa-spin"></i> Creating account...</span>
        </button>
      </form>
 
      <div class="auth-footer-link">
        Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
      </div>
    </div>
  </div>
</div>
 
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script>
function togglePassword(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
  } else {
    inp.type = 'password';
    btn.innerHTML = '<i class="fas fa-eye"></i>';
  }
}
document.getElementById('confirmPass').addEventListener('input', function() {
  const pass = document.getElementById('passwordInput').value;
  const icon = document.getElementById('passMatchIcon');
  if (this.value && this.value === pass) {
    icon.innerHTML = '✅';
  } else if (this.value) {
    icon.innerHTML = '❌';
  } else {
    icon.innerHTML = '';
  }
});
document.getElementById('signupForm').addEventListener('submit', function(e) {
  const pass = document.getElementById('passwordInput').value;
  const confirm = document.getElementById('confirmPass').value;
  if (pass !== confirm) {
    e.preventDefault();
    alert('Passwords do not match!');
    return;
  }
  document.querySelector('.btn-text').style.display = 'none';
  document.querySelector('.btn-loading').style.display = 'inline';
});
</script>
</body>
</html>
